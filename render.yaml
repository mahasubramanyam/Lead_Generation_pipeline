services:
  - type: web
    name: lead-pipeline
    env: node
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: ALLOW_NETWORK
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lead-pipeline-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"

databases:
  - name: lead-pipeline-db
    databaseName: lead_pipeline
    user: lead_pipeline
    plan: free
