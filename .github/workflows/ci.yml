name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DATABASE_URL: postgresql://user:pass@localhost:5432/lead_pipeline
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: lp-ci-secret
  ALLOW_NETWORK: "false"

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: lead_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Start server
        run: |
          node server.js &
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/auth/check > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done

      - run: npm run test:all
